<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a8edea"/>
      <stop offset="100%" stop-color="#38b2ac"/>
    </radialGradient>
    <radialGradient id="bellyGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="100%" stop-color="#f6e05e"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Stars / sparkles -->
  <circle cx="30" cy="40" r="2" fill="#f6e05e" opacity="0.8"/>
  <circle cx="160" cy="30" r="1.5" fill="#f6e05e" opacity="0.6"/>
  <circle cx="170" cy="80" r="1" fill="#f6e05e" opacity="0.5"/>
  <circle cx="25" cy="140" r="1.5" fill="#f6e05e" opacity="0.7"/>
  <circle cx="155" cy="155" r="2" fill="#f6e05e" opacity="0.6"/>

  <!-- Waddle body (penguin-like) -->
  <!-- Main body -->
  <ellipse cx="100" cy="118" rx="38" ry="46" fill="url(#bodyGrad)"/>
  <!-- Belly -->
  <ellipse cx="100" cy="124" rx="22" ry="30" fill="url(#bellyGrad)"/>

  <!-- Head -->
  <ellipse cx="100" cy="74" rx="26" ry="24" fill="url(#bodyGrad)"/>

  <!-- Eyes -->
  <circle cx="91" cy="70" r="6" fill="white"/>
  <circle cx="109" cy="70" r="6" fill="white"/>
  <circle cx="92" cy="70" r="3.5" fill="#2d3748"/>
  <circle cx="110" cy="70" r="3.5" fill="#2d3748"/>
  <!-- Eye shine -->
  <circle cx="93.5" cy="68.5" r="1.2" fill="white"/>
  <circle cx="111.5" cy="68.5" r="1.2" fill="white"/>

  <!-- Beak -->
  <polygon points="100,78 93,84 107,84" fill="#f6ad55"/>
  <line x1="93" y1="81" x2="107" y2="81" stroke="#dd6b20" stroke-width="1"/>

  <!-- Wings -->
  <ellipse cx="62" cy="118" rx="14" ry="26" fill="#2c7a7b" transform="rotate(-12,62,118)"/>
  <ellipse cx="138" cy="118" rx="14" ry="26" fill="#2c7a7b" transform="rotate(12,138,118)"/>

  <!-- Feet -->
  <ellipse cx="88" cy="161" rx="12" ry="6" fill="#f6ad55" transform="rotate(-10,88,161)"/>
  <ellipse cx="112" cy="161" rx="12" ry="6" fill="#f6ad55" transform="rotate(10,112,161)"/>

  <!-- Text label -->
  <text x="100" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e2e8f0" letter-spacing="2">STURDY WADDLE</text>
</svg>
